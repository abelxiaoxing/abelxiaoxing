    <rect class="card2" width="330" height="170" rx="18"/><text x="26" y="42" class="head">🤖 Agent / LLM</text><text x="26" y="72" class="body">RAG · Embedding · ReAct</text><text x="26" y="98" class="body">Function Calling · MCP / Skills</text><text x="26" y="124" class="body">Prompt Pipeline · Guardrails</text><rect x="26" y="144" width="250" height="6" rx="3" fill="#102A3A"/><rect class="bar" x="26" y="144" width="218" height="6" rx="3" fill="#00E5FF"/>
  </g>
  <g transform="translate(435 170)">
    <rect class="card2" width="330" height="170" rx="18"/><text x="26" y="42" class="head">👁 Vision / Time-series</text><text x="26" y="72" class="body">PyTorch · timm · OpenCV</text><text x="26" y="98" class="body">Classification · Detection · QA</text><text x="26" y="124" class="body">Evaluation / Training Pipelines</text><rect x="26" y="144" width="250" height="6" rx="3" fill="#102A3A"/><rect class="bar" x="26" y="144" width="228" height="6" rx="3" fill="#7C3AED"/>
  </g>
  <g transform="translate(800 170)">
    <rect class="card2" width="330" height="170" rx="18"/><text x="26" y="42" class="head">🧊 3D / Geometry</text><text x="26" y="72" class="body">ASTRA Toolbox · Open3D</text><text x="26" y="98" class="body">GPU Reconstruction · Calibration</text><text x="26" y="124" class="body">Point Cloud Processing</text><rect x="26" y="144" width="250" height="6" rx="3" fill="#102A3A"/><rect class="bar" x="26" y="144" width="204" height="6" rx="3" fill="#FF2BD6"/>
  </g>

  <g transform="translate(70 370)">
    <rect class="card" width="250" height="120" rx="16"/><text x="22" y="38" class="head">🚀 Deployment</text><text x="22" y="68" class="body">ONNX · TensorRT · CUDA</text><text x="22" y="94" class="body">Linux · Docker · Jetson</text>
    <rect class="card" x="285" width="250" height="120" rx="16"/><text x="307" y="38" class="head">🛠 Tooling</text><text x="307" y="68" class="body">FastAPI · PySide6 · Vue</text><text x="307" y="94" class="body">SSE logs · automation</text>
    <rect class="card" x="570" width="250" height="120" rx="16"/><text x="592" y="38" class="head">⚙ Systems</text><text x="592" y="68" class="body">C/C++ · Rust · Bash</text><text x="592" y="94" class="body">Performance · packaging</text>
    <rect class="card" x="855" width="205" height="120" rx="16"/><text x="877" y="38" class="head">📡 Signal</text><text x="877" y="68" class="body">Reliable</text><text x="877" y="94" class="body">Reproducible</text>
  </g>

  <g opacity=".92"><circle class="pulse" cx="1038" cy="90" r="5" fill="#00E5FF" filter="url(#glow)"/><circle class="pulse" cx="1082" cy="90" r="5" fill="#FF2BD6" filter="url(#glow)"/><circle class="pulse" cx="1126" cy="90" r="5" fill="#7C3AED" filter="url(#glow)"/></g>
  <text x="70" y="548" class="tiny">skills.map() =&gt; agentic_ai + vision_intelligence + gpu_runtime + product_engineering</text><text x="1130" y="548" text-anchor="end" class="tiny">MATRIX LOCKED</text>
