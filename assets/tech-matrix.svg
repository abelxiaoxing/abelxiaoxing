<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/><stop offset=".55" stop-color="#071827"/><stop offset="1" stop-color="#150925"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF"/><stop offset=".52" stop-color="#7C3AED"/><stop offset="1" stop-color="#FF2BD6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" stroke="#22D3EE" stroke-width=".55" opacity=".11"/></pattern>
    <style>
      .title{font:800 34px 'Segoe UI',Ubuntu,sans-serif;letter-spacing:3px;fill:#E6FBFF}.sub{font:600 15px 'Fira Code',Consolas,monospace;fill:#7DD3FC}.head{font:800 18px 'Segoe UI',Ubuntu,sans-serif;letter-spacing:1px;fill:#E6FBFF}.body{font:500 14px 'Fira Code',Consolas,monospace;fill:#BCEFFF}.tiny{font:500 11px 'Fira Code',Consolas,monospace;fill:#7DD3FC}.card{fill:rgba(8,17,31,.78);stroke:#22D3EE;stroke-width:1;}.card2{fill:rgba(8,17,31,.72);stroke:url(#line);stroke-width:1.2}.bar{filter:url(#glow)}.pulse{animation:pulse 2.8s ease-in-out infinite;transform-origin:center}@keyframes pulse{50%{opacity:.45;transform:scale(.98)}}
    </style>
  </defs>
  <rect width="1200" height="620" rx="30" fill="url(#bg)"/><rect width="1200" height="620" rx="30" fill="url(#grid)"/>
  <rect x="22" y="22" width="1156" height="576" rx="24" stroke="url(#line)" stroke-width="2" opacity=".72"/>
