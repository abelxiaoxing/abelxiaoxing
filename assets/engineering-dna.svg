<svg width="1200" height="470" viewBox="0 0 1200 470" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="470" gradientUnits="userSpaceOnUse"><stop stop-color="#020617"/><stop offset=".54" stop-color="#061827"/><stop offset="1" stop-color="#160B2F"/></linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse"><stop stop-color="#00E5FF"/><stop offset=".52" stop-color="#7C3AED"/><stop offset="1" stop-color="#FF2BD6"/></linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" stroke="#22D3EE" stroke-width=".55" opacity=".1"/></pattern>
    <style>.title{font:800 32px 'Segoe UI',Ubuntu,sans-serif;letter-spacing:3px;fill:#E6FBFF}.sub{font:600 13px 'Fira Code',Consolas,monospace;fill:#7DD3FC}.h{font:800 19px 'Segoe UI',Ubuntu,sans-serif;fill:#E6FBFF}.b{font:500 14px 'Fira Code',Consolas,monospace;fill:#BCEFFF}.tiny{font:500 11px 'Fira Code',Consolas,monospace;fill:#7DD3FC}.card{fill:rgba(8,17,31,.78);stroke:url(#neon);stroke-width:1.3}.orb{animation:pulse 2.5s ease-in-out infinite;transform-origin:center}@keyframes pulse{50%{opacity:.45;transform:scale(.92)}}</style>
  </defs>
  <rect width="1200" height="470" rx="28" fill="url(#bg)"/><rect width="1200" height="470" rx="28" fill="url(#grid)"/><rect x="22" y="22" width="1156" height="426" rx="22" stroke="url(#neon)" stroke-width="2" opacity=".72"/>
  <text x="70" y="76" class="title">ENGINEERING DNA</text><text x="70" y="104" class="sub">principles compiled into daily build habits</text><line x1="70" y1="126" x2="1130" y2="126" stroke="url(#neon)" stroke-width="2" opacity=".65"/>
  <g transform="translate(70 160)"><rect class="card" width="510" height="102" rx="18"/><circle class="orb" cx="48" cy="51" r="18" fill="#00E5FF" filter="url(#glow)"/><text x="84" y="43" class="h">Systems Thinking</text><text x="84" y="72" class="b">Connect sensors, data, models, UI, backend, deployment, and observability.</text></g>
  <g transform="translate(620 160)"><rect class="card" width="510" height="102" rx="18"/><circle class="orb" cx="48" cy="51" r="18" fill="#7C3AED" filter="url(#glow)"/><text x="84" y="43" class="h">Performance First</text><text x="84" y="72" class="b">Care about latency, memory, throughput, GPU utilization, and real-world stability.</text></g>
  <g transform="translate(70 292)"><rect class="card" width="510" height="102" rx="18"/><circle class="orb" cx="48" cy="51" r="18" fill="#FF2BD6" filter="url(#glow)"/><text x="84" y="43" class="h">Reproducible Debugging</text><text x="84" y="72" class="b">Prefer logs, tests, metrics, QA gates, and root-cause analysis over guesswork.</text></g>
  <g transform="translate(620 292)"><rect class="card" width="510" height="102" rx="18"/><circle class="orb" cx="48" cy="51" r="18" fill="#00E5FF" filter="url(#glow)"/><text x="84" y="43" class="h">Productized AI</text><text x="84" y="72" class="b">Turn algorithms and agent workflows into traceable, testable, reusable software.</text></g>
  <text x="70" y="424" class="tiny">core.values = [systems, performance, reproducibility, delivery]</text><text x="1130" y="424" text-anchor="end" class="tiny">DNA VERIFIED</text>
</svg>
