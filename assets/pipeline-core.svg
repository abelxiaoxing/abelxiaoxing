<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="430" gradientUnits="userSpaceOnUse"><stop stop-color="#030712"/><stop offset=".5" stop-color="#071827"/><stop offset="1" stop-color="#150925"/></linearGradient>
    <linearGradient id="neon" x1="70" y1="0" x2="1130" y2="0" gradientUnits="userSpaceOnUse"><stop stop-color="#00E5FF"/><stop offset=".5" stop-color="#7C3AED"/><stop offset="1" stop-color="#FF2BD6"/></linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse"><path d="M26 0H0V26" stroke="#22D3EE" stroke-width=".5" opacity=".12"/></pattern>
    <style>.title{font:800 30px 'Segoe UI',Ubuntu,sans-serif;letter-spacing:3px;fill:#E6FBFF}.sub{font:600 13px 'Fira Code',Consolas,monospace;fill:#7DD3FC}.n{font:800 18px 'Fira Code',Consolas,monospace;fill:#00E5FF}.h{font:800 17px 'Segoe UI',Ubuntu,sans-serif;fill:#E6FBFF}.b{font:500 12px 'Fira Code',Consolas,monospace;fill:#BCEFFF}.tiny{font:500 11px 'Fira Code',Consolas,monospace;fill:#7DD3FC}.node{fill:rgba(8,17,31,.82);stroke:url(#neon);stroke-width:1.4}.dash{stroke-dasharray:9 10;animation:dash 12s linear infinite}.pulse{animation:pulse 2.3s ease-in-out infinite;transform-origin:center}@keyframes dash{to{stroke-dashoffset:-230}}@keyframes pulse{50%{opacity:.52;transform:scale(.94)}}</style>
  </defs>
  <rect width="1200" height="430" rx="28" fill="url(#bg)"/><rect width="1200" height="430" rx="28" fill="url(#grid)"/><rect x="22" y="22" width="1156" height="386" rx="22" stroke="url(#neon)" stroke-width="2" opacity=".72"/>
  <text x="70" y="74" class="title">AI ENGINEERING PIPELINE</text><text x="70" y="102" class="sub">data signal → model core → agent layer → runtime → edge/cloud delivery</text>
  <path class="dash" d="M170 238H1030" stroke="url(#neon)" stroke-width="3" opacity=".75" filter="url(#glow)"/>
  <g transform="translate(80 160)"><rect class="node" width="190" height="155" rx="20"/><text x="24" y="42" class="n">01</text><text x="70" y="42" class="h">Data Signal</text><text x="24" y="76" class="b">Vision / Spectral</text><text x="24" y="102" class="b">Time-series / Geometry</text><text x="24" y="128" class="b">Clean labels · QA gates</text></g>
  <g transform="translate(300 160)"><rect class="node" width="190" height="155" rx="20"/><text x="24" y="42" class="n">02</text><text x="70" y="42" class="h">Model Core</text><text x="24" y="76" class="b">PyTorch · OpenCV</text><text x="24" y="102" class="b">Training / Evaluation</text><text x="24" y="128" class="b">Reproducible metrics</text></g>
  <g transform="translate(520 160)"><rect class="node" width="190" height="155" rx="20"/><text x="24" y="42" class="n">03</text><text x="70" y="42" class="h">Agent Layer</text><text x="24" y="76" class="b">RAG · Tools · MCP</text><text x="24" y="102" class="b">Prompt pipeline</text><text x="24" y="128" class="b">Guardrails / logs</text></g>
  <g transform="translate(740 160)"><rect class="node" width="190" height="155" rx="20"/><text x="24" y="42" class="n">04</text><text x="70" y="42" class="h">Runtime</text><text x="24" y="76" class="b">ONNX · TensorRT</text><text x="24" y="102" class="b">FastAPI · SSE</text><text x="24" y="128" class="b">GPU optimization</text></g>
  <g transform="translate(960 160)"><rect class="node" width="160" height="155" rx="20"/><text x="22" y="42" class="n">05</text><text x="68" y="42" class="h">Deploy</text><text x="22" y="76" class="b">Linux / Docker</text><text x="22" y="102" class="b">Edge / Cloud</text><text x="22" y="128" class="b">Operate / Iterate</text></g>
  <circle class="pulse" cx="170" cy="238" r="8" fill="#00E5FF" filter="url(#glow)"/><circle class="pulse" cx="390" cy="238" r="8" fill="#00E5FF" filter="url(#glow)"/><circle class="pulse" cx="610" cy="238" r="8" fill="#7C3AED" filter="url(#glow)"/><circle class="pulse" cx="830" cy="238" r="8" fill="#FF2BD6" filter="url(#glow)"/><circle class="pulse" cx="1040" cy="238" r="8" fill="#00E5FF" filter="url(#glow)"/>
  <text x="70" y="370" class="tiny">pipeline.run(research=True, product=True, performance=True, reproducible=True)</text><text x="1130" y="370" text-anchor="end" class="tiny">FLOW: STABLE</text>
</svg>
